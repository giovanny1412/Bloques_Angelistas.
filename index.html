<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Blockly Car Control</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        #blocklyDiv { height: 500px; width: 100%; border: 1px solid #ccc; border-radius: 8px; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-connect { background-color: #28a745; color: white; }
        .btn-code { background-color: #007bff; color: white; }
        #codigoGenerado { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>

    <h2>🤖 Mi Plataforma de Robótica ESP32</h2>

    <div id="blocklyDiv"></div>

    <div class="controls">
        <button class="btn-connect" onclick="conectarESP32()">🔌 Conectar ESP32</button>
        <button class="btn-code" onclick="generarCodigo()">🚀 Generar y Mostrar Código</button>
    </div>

    <h3>Código C++ (Arduino):</h3>
    <pre id="codigoGenerado">// El código aparecerá aquí...</pre>

    <xml id="toolbox" style="display: none">
        <category name="Estructura" colour="290">
            <block type="arduino_base"></block>
        </category>
        <category name="Movimiento" colour="230">
            <block type="mover_carro"></block>
        </category>
        <category name="Control" colour="120">
            <block type="controls_repeat_ext">
                <value name="TIMES">
                    <shadow type="math_number">
                        <field name="NUM">10</field>
                    </shadow>
                </value>
            </block>
        </category>
    </xml>

    <script src="app.js"></script>
</body>
</html>
